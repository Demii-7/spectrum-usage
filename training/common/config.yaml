data:
  data_dir: evaluation/aerpaw
  band_definitions_path: evaluation/results/step2/band_definitions.csv
  reference_site: CC2
  chunks:
    - id: chunk_600_800
      start_mhz: 600.0
      end_mhz: 800.0
    - id: chunk_2400_2600
      start_mhz: 2400.0
      end_mhz: 2600.0
    - id: chunk_3500_3700
      start_mhz: 3500.0
      end_mhz: 3700.0

windowing:
  lookback: 60
  horizons: [1, 5, 15, 60]
  min_history: 4320

preprocessing:
  normalize: true
  # NaN imputation for interpolated-map mode.
  imputation:
    enabled: true
    window_steps: 2

outputs:
  root_dir: training/results

linear_autoregressive:
  ridge_alpha: 1.0

convlstm:
  input_sequence_length: 60
  prediction_horizon: 60
  batch_size: 32
  epochs: 25
  learning_rate: 0.0002
  weight_decay: 0.004
  val_fraction: 0.1
  teacher_forcing_ratio: 1.0
  gradient_clip_norm: 5.0
  model:
    input_channels: 1
    hidden_channels: [32, 64]
    kernel_size: [[1, 3], [1, 1]]
    num_encoder_layers: 2
    decoder_hidden_channels: 32
    decoder_kernel_size: [1, 1]
    dropout: 0.3
    use_batch_norm: true
    decoder_lstm_hidden: 128
    fc_hidden_channels: 0
    fc_kernel_size: [1, 3]
    cell_activation: "relu"
    fc_intermediate_activation: "relu"
    use_channel_projection: false
    channel_projection_dim: 16

stsprednet:
  lc: 36
  lp: 3
  lq: 4
  period_interval: 1440
  trend_interval: 10080
  batch_size: 32
  epochs: 25
  learning_rate: 0.0002
  weight_decay: 0.0
  gradient_clip_norm: 5.0
  patience: 30
  model:
    input_channels: 1
    map_height: 1
    hidden_dim: 128
    num_layers: 4
    kernel_size: [1, 3]
    output_activation: tanh
    fusion_weight_shape: per_location
    # Output channels for the PredRNN 1x1 output projection.
    #   1        — single-channel CSV mode (default, backward-compatible)
    #   >1       — multi-channel map mode (e.g., 200 for (F, H, W) maps)
    output_channels: 1
  # Interpolated-map input mode (alternative to the CSV-based pipeline).
  # Set enabled: true to use pre-interpolated .npz grid maps instead of
  # per-chunk AERPAW data.  shape: (T, H, W, F) -> (T, F, H, W).
  interpolated_map:
    enabled: false
    map_path: "evaluation/interpolated_maps/idw_ames_curtiss_600_800.npz"
    map_key: "map_db"
    n_freq_bins: 200
    grid_height: 50
    grid_width: 50
    # Temporal overrides for shorter map-mode datasets (~244 timesteps).
    # The default CSV params (lc=36, period_interval=1440) are too large.
    temporal_overrides:
      lc: 6
      lp: 2
      period_interval: 6

timeran:
  batch_size: 1
  epochs: 10
  learning_rate: 1.0e-5
  max_learning_rate: 1.0e-4
  weight_decay: 0.0
  gradient_clip_norm: 5.0
  checkpoint_size: base
  training_mode: linear_probing

tss_lcd:
  hidden_dim: 256
  attention_heads: 4
  ffn_dim: 1024
  num_attention_layers: 2
  dropout: 0.1
  use_temporal_branch: true
  use_spectral_branch: true
  use_spatial_branch: true
  latent_dim: 32
  autoencoder_num_blocks: 3
  autoencoder_initial_channels: 32
  diffusion_steps: 1000
  noise_schedule: cosine
  nen_encoder_channels: [64, 128]
  nen_bottleneck_channels: 256
  nen_decoder_channels: [128, 64]
  nen_kernel_size: 3
  time_embed_dim: 32
  batch_size: 32
  autoencoder_epochs: 300
  autoencoder_learning_rate: 0.0001
  tss_epochs: 200
  tss_learning_rate: 0.0001
  diffusion_epochs: 1000
  diffusion_learning_rate: 0.0001
  weight_decay: 0.0
  gradient_clip_norm: 5.0
  patience: 30
