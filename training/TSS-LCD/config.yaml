# =============================================================================
# TSS-LCD — Full Configuration
# =============================================================================
# Every tunable hyperparameter is exposed here. Scripts must read from this
# file; no values should be hardcoded unless they are fixed architectural
# constraints from the paper or repo (document those in the README).
# =============================================================================

data:
  # Path to the merged AERPAW CSV (headerless, 750 columns)
  dataset_path: /home/cc/spectrum-usage/training/data/merged_power_data_sub6GHz_avg_per_minute.csv
  # Number of sensor nodes in the CSV (3 = CC1, CC2, LW1)
  n_nodes: 3
  # Frequency bins per node (must divide 750 evenly)
  n_bins_per_node: 250
  # Node labels in CSV column order (columns 0-249, 250-499, 500-749)
  node_names: ["CC1", "CC2", "LW1"]

windowing:
  # Number of historical time steps used as model input (T_in)
  input_sequence_length: 50
  # Number of future time steps to predict (T_out)
  prediction_horizon: 10
  # Sliding-window stride for the training set (1 = every possible window)
  train_stride: 1
  # Sliding-window stride for the validation set
  val_stride: 1
  # Sliding-window stride for the test set
  test_stride: 1

split:
  # Fraction of windows assigned to training
  train_ratio: 0.7
  # Fraction of windows assigned to validation
  val_ratio: 0.15
  # Fraction of windows assigned to testing
  test_ratio: 0.15
  # If true, split is chronological (first train, then val, then test)
  chronological_split: true

preprocessing:
  # Normalization method: "minmax" (scale to [0,1]) or "zscore" (zero mean, unit variance)
  normalization: minmax
  # Fit the normalizer only on the training split (prevents data leakage)
  fit_on_train_only: true
  # Fraction of historical entries randomly masked to simulate incomplete observations
  missing_rate: 0.25
  # Masking strategy: "random" (per-entry Bernoulli) or "continuous" (contiguous block)
  masking_strategy: random
  # If true, replace masked entries with 0.0; if false, leave them as NaN (may require
  # different loss handling)
  zero_pad_missing: true
  # Run in complete-observation baseline mode (missing_rate forced to 0, masking
  # disabled). Use this for pipeline debugging before enabling masking.
  complete_observation_baseline: false

model:
  # --------------------------------------------------------------------------
  # TSS-CC branch architecture
  # --------------------------------------------------------------------------
  # Dimensionality of the conditional latent representation produced by TSS-CC
  # and consumed by the diffusion model
  latent_dim: 32
  # Hidden dimension used in multi-head self-attention projections and FFN layers
  # within each TSS branch (TemFE / SpeFE / SpaFE)
  hidden_dim: 256
  # Number of attention heads in each self-attention branch (must divide hidden_dim)
  attention_heads: 4
  # Inner dimension of the position-wise FFN within each transformer encoder layer
  ffn_dim: 1024
  # Number of stacked transformer encoder layers per TSS branch
  num_attention_layers: 2
  # Dropout rate applied within attention and FFN sub-layers
  dropout: 0.1
  # Independently toggle each TSS branch for ablation studies
  use_temporal_branch: true
  use_spectral_branch: true
  use_spatial_branch: true

  # --------------------------------------------------------------------------
  # Latent Space Encoder / Decoder (LSE / LSD) — Conv2D autoencoder
  # --------------------------------------------------------------------------
  # Number of stacked Conv2d downsampling blocks in the LSE (mirrored in LSD)
  autoencoder_num_blocks: 3
  # Channel progression for the autoencoder encoder (first block input channels =
  # always 1; output is treated as 2D image (T_out, L×F reshaped))
  autoencoder_hidden_channels: 64
  # Initial number of output channels from the first autoencoder block; doubled
  # after each downsampling block
  autoencoder_initial_channels: 32

  # --------------------------------------------------------------------------
  # Diffusion process
  # --------------------------------------------------------------------------
  # Number of forward / reverse diffusion steps (N)
  diffusion_steps: 1000
  # Noise schedule: "cosine" (default, matches repo) or "linear"
  noise_schedule: cosine

  # --------------------------------------------------------------------------
  # Noise Estimation Network (NEN) — Conv1D U-Net
  # --------------------------------------------------------------------------
  # Number of encoder/decoder blocks in the NEN's Conv1D U-Net
  nen_num_blocks: 2
  # Channel counts for the NEN U-Net encoder blocks (list, one per block)
  nen_encoder_channels: [64, 128]
  # Channel count for the NEN U-Net bottleneck
  nen_bottleneck_channels: 256
  # Channel counts for the NEN U-Net decoder blocks (list, one per block)
  nen_decoder_channels: [128, 64]
  # Kernel size for Conv1d layers in the NEN
  nen_kernel_size: 3
  # Dimension of the sinusoidal time embedding fed into the NEN
  time_embed_dim: 32

training:
  # --------------------------------------------------------------------------
  # Stage 1 — latent autoencoder pretraining
  # --------------------------------------------------------------------------
  autoencoder_epochs: 300
  autoencoder_learning_rate: 0.0001

  # --------------------------------------------------------------------------
  # Stage 2 — TSS condition stage training
  # --------------------------------------------------------------------------
  tss_epochs: 200
  tss_learning_rate: 0.0001

  # --------------------------------------------------------------------------
  # Stage 3 — LCD diffusion noise-estimation training
  # --------------------------------------------------------------------------
  diffusion_epochs: 1000
  diffusion_learning_rate: 0.0001

  # --------------------------------------------------------------------------
  # Shared training settings
  # --------------------------------------------------------------------------
  # Batch size (paper default: 32; repo config defaults to 256). Configurable
  # because memory and training speed depend on GPU availability.
  batch_size: 32
  # Optimizer choice ("adam" or "adamw")
  optimizer: adam
  # Weight decay for the optimizer (0.0 = no decay)
  weight_decay: 0.0
  # Max norm for gradient clipping (0 = no clipping)
  gradient_clip: 5.0
  # Optional learning rate scheduler: "none", "cosine", "plateau"
  lr_scheduler: none
  # Directory where per-stage checkpoints are saved / loaded
  checkpoint_dir: checkpoints

evaluation:
  # Metrics to compute during evaluation
  metrics: ["rmse", "mae", "r2"]
  # List of prediction horizons (in minutes) to evaluate. Each value is the
  # T_out index (1-based) at which metrics are computed.
  eval_horizons: [1, 5, 10]
  # Directory where evaluation results (CSV, plots) are written
  output_dir: results
  # Directory where trained model checkpoints are loaded from
  checkpoint_dir: checkpoints

device:
  # Device to use: "auto" (cuda if available else cpu), "cuda", or "cpu"
  device: auto

# Random seed for reproducibility (applied to Python, NumPy, and PyTorch).
# Set to null for non-deterministic runs.
seed: 42
