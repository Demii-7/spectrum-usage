data:
  dataset_path: /home/cc/spectrum-usage/training/data/cc2_smoke_test.csv
  n_nodes: 1
  n_bins_per_node: 250
  node_names: ["CC2"]
  selected_nodes: ["CC2"]
  cc2_only_smoke_test: false

windowing:
  input_sequence_length: 12
  prediction_horizon: 6
  train_stride: 10
  val_stride: 10
  test_stride: 10

split:
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  chronological_split: true

preprocessing:
  normalization: minmax
  fit_on_train_only: true
  missing_rate: 0.25
  masking_strategy: random
  zero_pad_missing: true
  complete_observation_baseline: false

model:
  latent_dim: 16
  hidden_dim: 64
  attention_heads: 2
  ffn_dim: 256
  num_attention_layers: 1
  dropout: 0.1
  use_temporal_branch: true
  use_spectral_branch: true
  use_spatial_branch: true
  autoencoder_num_blocks: 2
  autoencoder_hidden_channels: 32
  autoencoder_initial_channels: 16
  diffusion_steps: 50
  noise_schedule: cosine
  nen_encoder_channels: [32, 64]
  nen_bottleneck_channels: 128
  nen_decoder_channels: [64, 32]
  nen_kernel_size: 3
  time_embed_dim: 16

training:
  autoencoder_epochs: 2
  autoencoder_learning_rate: 0.001
  tss_epochs: 2
  tss_learning_rate: 0.001
  tss_condition_objective: projection_to_latent
  diffusion_epochs: 2
  diffusion_learning_rate: 0.001
  batch_size: 8
  optimizer: adam
  weight_decay: 0.0
  gradient_clip: 5.0
  lr_scheduler: none
  checkpoint_dir: checkpoints

evaluation:
  metrics: ["rmse", "mae", "r2"]
  eval_horizons: [1, 3, 6]
  output_dir: evaluation
  checkpoint_dir: checkpoints

device:
  device: auto

seed: 42
