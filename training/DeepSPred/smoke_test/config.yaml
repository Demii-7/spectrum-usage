data:
  dataset_path: "training/data/cc2_smoke_test.csv"
  nodes:
    CC2: {col_start: 0, col_end: 250}
  bins_per_node: 250

preprocessing:
  colormap: "jet"
  normalization: "minmax"

frames:
  minutes_per_frame: 256
  w_pad: 256
  w_orig: 250

windowing:
  input_frames: 2
  stride: 1

split:
  train_ratio: 0.8
  val_ratio: 0.1

model:
  embed_dim: 32
  depths: [2, 2, 2]
  num_heads: [2, 4, 4]
  patch_size: [2, 2, 4]
  window_size: [2, 2, 4]
  mlp_ratio: 4.0
  drop_rate: 0.0
  attn_drop_rate: 0.0
  drop_path_rate: 0.0

training:
  batch_size: 2
  epochs: 3
  learning_rate: 0.001
  weight_decay: 0.05
  patience: 10
  seed: 42

device: "auto"

checkpoints:
  dir: "training/DeepSPred/smoke_test/checkpoints"
  save_best: true
