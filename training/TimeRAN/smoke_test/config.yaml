data:
  dataset_path: "training/TimeRAN/smoke_test/cc2_2k.csv"
  n_features: 250
  n_nodes: 1
  bins_per_node: 250
  node_names: ["CC2"]

preprocessing:
  normalization: "revin_only"
  fit_on_train_only: true

windowing:
  input_sequence_length: 12
  prediction_horizon: 6
  stride: 1

split:
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  chronological_split: true

model:
  checkpoint_size: "base"
  task: "forecasting"
  freeze_backbone: true
  train_head_only: true

training:
  batch_size: 16
  epochs: 5
  learning_rate: 1.0e-5
  max_learning_rate: 1.0e-4
  optimizer: "adam"
  max_norm: 5.0
  seed: 42

evaluation:
  metrics: ["rmse", "mae"]
  eval_horizons: [1, 3, 6]

device:
  device: "auto"
