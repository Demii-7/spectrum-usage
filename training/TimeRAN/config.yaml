# =============================================================================
# TimeRAN Spectrum Prediction — Configuration
# =============================================================================
# Adaptation of TimeRAN foundation model for AERPAW spectrum prediction.
# Based on: "A Family of Open Time-Series Foundation Models for the RAN"
#   Panitsas, Tassiulas (arXiv 2026)
# =============================================================================
# Start conservatively: T_in=128, batch=1, freeze_backbone=true.
# GPU memory scales with C × N × d_model (channels × patches × model size).
# Prove pipeline works first, then scale.
# =============================================================================

data:
  # Path to the processed AERPAW 5 CSV (6839 rows × 750 cols, no header, dBm)
  dataset_path: "training/data/merged_power_data_sub6GHz_avg_per_minute.csv"
  # Total number of feature columns (3 nodes × 250 bins)
  n_features: 750
  # Number of sensor nodes
  n_nodes: 3
  # Frequency bins per node
  bins_per_node: 250
  # Node names (used for plot labels and per-node metrics)
  node_names: ["CC1", "CC2", "LW1"]

preprocessing:
  # Normalization: "revin_only" or "train_zscore"
  #   revin_only: use MOMENT's built-in RevIN (default, start here)
  #   train_zscore: external z-score computed on training split only
  normalization: "revin_only"
  # Fit external normalization on training set only (only used if train_zscore)
  fit_on_train_only: true

windowing:
  # Number of past time steps (minutes) used as input
  input_sequence_length: 128
  # Number of future time steps (minutes) to predict
  prediction_horizon: 16
  # Stride between consecutive windows
  stride: 16

split:
  # Train/validation/test split ratios (applied chronologically to raw time series)
  # Split FIRST, then generate windows inside each split
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  # If true, split chronologically (recommended for time series).
  # If false, splits are random.
  chronological_split: true

model:
  # TimeRAN variant: "small", "base", or "large"
  checkpoint_size: "base"
  # Downstream task (must be "forecasting" for spectrum prediction)
  task: "forecasting"
  # Freeze encoder + embedder during training (linear probing mode)
  freeze_backbone: true
  # Only train the forecasting head (synonym for linear probing)
  train_head_only: true

training:
  # Batch size (start at 1 due to 750 channels × memory; increase after pipeline works)
  batch_size: 1
  # Number of training epochs
  epochs: 10
  # Initial learning rate
  learning_rate: 1.0e-5
  # Max learning rate for OneCycleLR scheduler (used in full fine-tuning)
  max_learning_rate: 1.0e-4
  # Optimizer
  optimizer: "adam"
  # Gradient clipping max norm
  max_norm: 5.0
  # Random seed for reproducibility
  seed: 42

evaluation:
  # Metrics to compute during evaluation
  metrics: ["rmse", "mae"]
  # Specific future time steps for per-horizon reporting (1 to prediction_horizon)
  eval_horizons: [1, 4, 8, 16]

device:
  # Device: "cuda:N", "cpu", or "auto"
  device: "auto"
