data:
  dataset_path: "training/data/merged_power_data_sub6GHz_avg_per_minute.csv"
  n_nodes: 1
  bins_per_node: 250
  node_names: ["CC2"]
  selected_nodes: ["CC2"]
  max_rows: 2000
  cc2_only_smoke_test: true
  map_representation: node_frequency

windowing:
  input_sequence_length: 10
  prediction_horizon: 10
  train_stride: 10
  val_stride: 10
  test_stride: 10

split:
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  chronological_split: true

preprocessing:
  normalization: minmax
  minmax_range: [-1, 1]
  fit_on_train_only: true
  missing_rate: 0.3
  missing_strategy: random
  anomaly_strategy: none
  anomaly_value_dbm: -150
  mask_targets: false

model:
  model_name: dswinlstm_i
  map_height: 1
  map_width: 250
  input_channels: 1
  patch_size:
  patch_shape: [1, 2]
  embed_dim: 32
  hidden_dim:
  encoder_units: 1
  decoder_units: 1
  swin_depths: [2, 2]
  num_heads: [2, 2]
  window_size: 4
  use_patch_merging: false
  use_patch_expanding: false
  use_imputation_unit: true
  mask_as_input_channel: false
  output_activation: tanh
  decoder_feedback: hidden_state
  padding_mode: "reflect"

training:
  batch_size: 2
  epochs: 2
  learning_rate: 0.0001
  optimizer: adam
  loss: mse
  early_stopping: false
  patience: 30
  gradient_clip: 5.0
  seed: 42

evaluation:
  metrics: ["rmse", "mae", "r2", "nrmse_db"]
  eval_horizons:
  export_predictions: true
  plot_denormalized_dbm: true

paths:
  checkpoints_dir: checkpoints
  evaluation_dir: evaluation

device:
  device: auto
