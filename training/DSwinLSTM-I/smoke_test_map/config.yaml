data:
  format: interpolated_map
  dataset_path: "training/data/merged_power_data_sub6GHz_avg_per_minute.csv"
  map_path: "evaluation/interpolated_maps/idw_ames_curtiss_600_800.npz"
  map_key: "map_db"
  n_nodes: 1
  bins_per_node: 200
  node_names: ["grid"]
  selected_nodes: ["grid"]
  max_rows: 160
  cc2_only_smoke_test: false
  map_representation: node_frequency

windowing:
  input_sequence_length: 10
  prediction_horizon: 10
  train_stride: 10
  val_stride: 10
  test_stride: 10

split:
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  chronological_split: true

preprocessing:
  normalization: minmax
  minmax_range: [-1, 1]
  fit_on_train_only: true
  missing_rate: 0.3
  missing_strategy: random
  anomaly_strategy: none
  anomaly_value_dbm: -150
  mask_targets: false
  nan_time_window_steps: 2
  nan_frequency_window_steps: 2

model:
  model_name: dswinlstm_i
  map_height: 50
  map_width: 50
  input_channels: 200
  patch_size:
  patch_shape: [2, 2]
  embed_dim: 32
  hidden_dim:
  hidden_dims: [32, 64]
  encoder_units: 2
  decoder_units: 2
  swin_depths: [1, 1, 1, 1]
  num_heads: [2, 4, 4, 2]
  window_size: 4
  use_patch_merging: true
  use_patch_expanding: true
  use_imputation_unit: true
  mask_as_input_channel: false
  output_activation: tanh
  decoder_feedback: pixel_feedback
  padding_mode: reflect

training:
  batch_size: 2
  epochs: 2
  learning_rate: 0.0001
  optimizer: adam
  loss: mse
  early_stopping: false
  patience: 30
  gradient_clip: 5.0
  lr_scheduler: none
  lr_patience: 5
  lr_factor: 0.5
  teacher_forcing_ratio: 1.0
  seed: 42

evaluation:
  metrics: ["rmse", "mae", "r2", "nrmse_db"]
  eval_horizons:
  export_predictions: true
  plot_denormalized_dbm: true

paths:
  checkpoints_dir: smoke_test_map/checkpoints
  evaluation_dir: smoke_test_map/evaluation

device:
  device: auto
