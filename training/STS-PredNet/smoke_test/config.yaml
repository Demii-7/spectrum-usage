# =============================================================================
# STS-PredNet Spectrum Prediction — Smoke Test Config (1-node, CC2-only)
# =============================================================================
# Cross-model compatibility mode: 1 node, closeness-only, multi-step evaluate.
# Lightweight config for CPU-based pipeline verification.
# =============================================================================

data:
  format: "csv"
  dataset_path: "training/data/cc2_smoke_test.csv"
  n_nodes: 1
  bins_per_node: 250
  n_features: 250
  node_names: ["CC2"]

preprocessing:
  normalization: "minmax_neg1_pos1"
  fit_on_train_only: true

splits:
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  chronological_split: true

windowing:
  input_sequence_length: 12
  prediction_horizon: 6
  train_stride: 1
  val_stride: 6
  test_stride: 6

branches:
  use_closeness: true
  use_period: false
  use_trend: false

  lc: 12
  lp: 3
  lq: 4

  prediction_offset: 1

  period_interval: 10
  trend_interval: 20

  share_branch_weights: false

model:
  input_channels: 1
  map_height: 1
  map_width: 250
  num_layers: 1
  hidden_dim: 16
  kernel_size: [3, 3]
  fusion_weight_shape: "per_location"
  output_activation: "tanh"

training:
  batch_size: 8
  epochs: 3
  learning_rate: 0.001
  optimizer: "adam"
  beta1: 0.9
  beta2: 0.999
  epsilon: 1.0e-8
  weight_decay: 0.0
  loss: "mse"
  early_stopping: true
  patience: 5
  gradient_clip_norm: 5.0
  seed: 42

evaluation:
  eval_horizons: [1, 3, 6]
  metrics: ["rmse", "mae", "r2"]
  optional_metrics: ["mape"]
  per_node_metrics: true
  per_frequency_metrics: true

device:
  device: "cpu"
