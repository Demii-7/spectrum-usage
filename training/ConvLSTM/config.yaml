# =============================================================================
# ConvLSTM Spectrum Prediction — Configuration
# =============================================================================
# Reconstructed from: "ConvLSTM-based Long-Term Spectrum Prediction for DSA"
#   Shawel, Woldegebreal, Pollin (EUSIPCO 2019)
# =============================================================================

data:
  # Data format: "csv" (original node-frequency) or "interpolated_map" (pre-interpolated grid)
  format: "csv"
  # CSV mode: path to the processed AERPAW 5 CSV (6839 rows × 750 cols, no header, dBm)
  dataset_path: "training/data/merged_power_data_sub6GHz_avg_per_minute.csv"
  # Number of frequency bins per node (CSV mode)
  n_bins_per_node: 250
  # Number of sensor nodes (CSV mode)
  n_nodes: 3
  # Node names (used for plot labels and per-node metrics)
  node_names: ["CC1", "CC2", "LW1"]
  # Interpolated-map mode: path to .npz with pre-interpolated map data
  map_path: ""
  # Key inside the .npz file containing the map data
  map_key: "map_db"
  # Number of frequency / feature channels for interpolated-map mode (F dimension)
  n_freq_bins: 200
  # Spatial grid height (H) for interpolated-map mode
  grid_height: 50
  # Spatial grid width (W) for interpolated-map mode
  grid_width: 50

preprocessing:
  # Normalization method: "zscore" or "minmax" or "none"
  normalization: "zscore"
  # Fit normalization on training set only (true) or full dataset (false)
  fit_on_train_only: true
  # NaN imputation for interpolated-map mode.
  imputation:
    enabled: true
    window_steps: 2

windowing:
  # Number of past time steps (minutes) used as input
  input_sequence_length: 12
  # Number of future time steps (minutes) to predict
  prediction_horizon: 6
  # Stride between consecutive windows (1 = sliding window)
  stride: 1

split:
  # Train/validation/test split ratios.
  # Set val_ratio to 0 for train/test only (no validation set).
  # If all three sum to 1.0, all data is used.
  # If they sum to < 1.0, the remainder is unused.
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  # If true, split chronologically (recommended for time series).
  # If false, splits are random.
  chronological_split: true

model:
  # Number of input channels (1 for CSV mode; n_freq_bins for interpolated_map mode)
  input_channels: 1
  # Optional 1×1 Conv2d projection before the encoder to reduce channel dimension
  # (useful when input_channels is large, e.g. 200 freq bins → 16)
  use_channel_projection: false
  channel_projection_dim: 16
  # Hidden channels per ConvLSTM layer (encoder layers)
  hidden_channels: [32, 64]
  # Kernel size per ConvLSTM layer (encoder layers)
  kernel_size: [[3, 3], [1, 1]]
  # Number of ConvLSTM layers in the encoder
  num_encoder_layers: 2
  # Hidden channels for the decoder ConvLSTM layer
  decoder_hidden_channels: 32
  # Kernel size for the decoder ConvLSTM layer (1×1 per paper §III-A)
  decoder_kernel_size: [1, 1]
  # Dropout probability (applied after ConvLSTM layers)
  dropout: 0.3
  # Whether to use batch normalization after ConvLSTM layers
  use_batch_norm: true
  # Hidden size for the intermediate regular LSTM layer in the decoder
  decoder_lstm_hidden: 128
  # FC (dense) output layer: hidden channels for the intermediate conv layer.
  # Set to 0 (default) for a single 1×1 Conv2d(hidden→1) per the paper.
  # Set > 0 for a two-layer MLP: Conv2d(hidden→fc_hidden, k=fc_kernel) + ReLU + Conv2d(fc_hidden→1, k=1).
  fc_hidden_channels: 0
  # FC layer intermediate kernel size (only used if fc_hidden_channels > 0)
  fc_kernel_size: [3, 3]
  # Activation for ConvLSTM cell candidate (g) and output (h = o * activation(c)).
  # Options: relu, tanh, sigmoid, gelu, leaky_relu, elu
  cell_activation: "relu"
  # Activation for the optional FC intermediate layer (only used if fc_hidden_channels > 0).
  # Options: relu, tanh, sigmoid, gelu, leaky_relu, elu
  fc_intermediate_activation: "relu"

training:
  # Batch size
  batch_size: 32
  # Number of training epochs
  epochs: 100
  # Initial learning rate
  learning_rate: 0.0002
  # Optimizer: "adam" or "nadam" (NADAM requires third-party lib)
  optimizer: "adam"
  # Adam/NADAM beta1
  beta1: 0.9
  # Adam/NADAM beta2
  beta2: 0.999
  # Adam epsilon
  epsilon: 1.0e-8
  # Weight decay (L2 regularization)
  weight_decay: 0.004
  # Learning rate scheduler: "reduce_on_plateau" or "none"
  lr_scheduler: "reduce_on_plateau"
  # ReduceLROnPlateau patience (epochs)
  lr_patience: 10
  # Early stopping patience (epochs)
  early_stopping_patience: 20
  # Gradient clipping max norm
  gradient_clip_norm: 5.0
  # Loss function: "mse" or "mae"
  loss: "mse"
  # Whether to use teacher forcing during training
  teacher_forcing_ratio: 1.0
  # Gaussian noise std added to training inputs (regularization, paper §III-B)
  noise_std: 0.2

evaluation:
  # Metrics to compute during evaluation
  metrics: ["rmse", "mae", "r2"]
  # Number of future time steps to evaluate (1 to prediction_horizon)
  eval_horizons: [1, 3, 6]

device:
  # Device: "cuda", "cpu", or "auto"
  device: "auto"
