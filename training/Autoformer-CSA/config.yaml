# ──────────────────────────────────────────────
# Autoformer-CSA — AERPAW Spectrum Prediction Config
# ──────────────────────────────────────────────
# Everything in this file is tunable. Defaults follow the Autoformer-CSA paper
# where applicable; deviations are noted inline.

data:
  # Path to the merged AERPAW CSV with all nodes. Shape expected: (6839, 750).
  # Configurable because the CSV may move between environments.
  dataset_path: "training/data/aerpaw_merged.csv"

  # Total frequency bins across all nodes (3 nodes × 250 bins).
  # Configurable in case the merge produces a different column count.
  n_features: 750

  # Number of fixed nodes in the AERPAW dataset.
  n_nodes: 3

  # Frequency bins per node. Product n_nodes * bins_per_node must equal n_features.
  bins_per_node: 250

  # Human-readable labels for the three nodes, in column order.
  node_names: ["CC1", "CC2", "LW1"]

  # Subset of nodes to include. Used to select columns during data loading.
  # Configurable to experiment with single-node vs multi-node training.
  selected_nodes: ["CC1", "CC2", "LW1"]

  # Smoke-test mode: when true, only CC2 columns (indices 250-499) are used.
  # This reduces the channel count from 750 to 250, allowing quick verification
  # that the model trains and converges before committing to full runs.
  # In CC2-only smoke mode, set enc_in=dec_in=c_out=250.
  # In full 3-node mode, set enc_in=dec_in=c_out=750.
  cc2_only_smoke_test: false

windowing:
  # Number of past time steps fed to the encoder (M in the paper).
  # Paper default: 96. Configurable for different lookback horizons.
  seq_len: 96

  # Number of time steps from the encoder output used as known context for the
  # decoder (the "start token" length). Paper uses M/2 = 48.
  # Configurable to test different context lengths.
  label_len: 48

  # Number of future time steps to predict (K in the paper).
  # Paper evaluates K ∈ {60, 120, 240, 300}. Configurable per experiment.
  pred_len: 60

  # Stride between successive training windows. 1 = maximum overlap (default).
  # Higher values reduce dataset size and training time.
  train_stride: 1

  # Stride for validation windows. Leave empty to default to pred_len
  # (non-overlapping windows for clean evaluation).
  val_stride:

  # Stride for test windows. Leave empty to default to pred_len.
  test_stride:

split:
  # Fraction of data used for training. Paper uses 5/7 ≈ 0.714.
  # Configurable: different data sizes may require different splits.
  train_ratio: 0.7142857

  # Fraction used for validation. Paper uses 1/7 ≈ 0.143.
  val_ratio: 0.1428571

  # Fraction used for testing. Paper uses 1/7 ≈ 0.143.
  test_ratio: 0.1428571

  # If true, splits are chronological (earliest → train, middle → val, latest → test).
  # Setting to false would enable random splitting (not recommended for time series).
  chronological_split: true

preprocessing:
  # Normalization method. Paper uses z-score (mean removal + unit variance).
  # Configurable to add min-max or robust scaling if needed.
  normalization: "zscore"

  # When true, mean/std are computed on the training split only and applied to
  # val/test. This prevents data leakage from future to past.
  fit_on_train_only: true

model:
  # Model identifier — used for checkpoint naming and logging.
  model_name: "autoformer_csa"

  # Number of input channels (features). Matches the CSV column count after
  # node selection. CC2 smoke mode = 250, full 3-node mode = 750.
  enc_in: 750

  # Number of decoder input channels. Typically same as enc_in.
  dec_in: 750

  # Number of output channels. Typically same as enc_in.
  # Must match the final linear projection dimension.
  c_out: 750

  # Hidden dimension of the model (d_model in Transformer terminology).
  # Paper does not specify; repo default is 512. Configurable for memory/performance.
  d_model: 512

  # Hidden dimension of the feed-forward network (d_ff). Only used when
  # use_csam=false (vanilla Autoformer mode). Typically 4 * d_model.
  d_ff: 2048

  # Number of encoder layers. Paper default: 2.
  # Configurable for ablation on model depth.
  encoder_layers: 2

  # Number of decoder layers. Paper default: 1.
  decoder_layers: 1

  # Number of attention heads in the auto-correlation mechanism.
  # Paper default: 8. Must divide d_model evenly.
  n_heads: 8

  # Kernel size for the moving average in the series decomposition block.
  # Paper default: 25. Configurable for different trend smoothness.
  moving_avg: 25

  # Dropout rate applied throughout the model (attention, CSAM, embeddings).
  # Paper default: 0.1. Configurable for regularization tuning.
  dropout: 0.1

  # Expansion factor for the auto-correlation top-k selection.
  # Paper default: 3 (repo default). Controls how many periods are aggregated.
  factor: 3

  # Activation function used inside the model. "relu" or "gelu".
  # Paper uses relu. Configurable for experimentation.
  activation: "relu"

  # When true, replaces the standard Conv1d FFN with the CSAM module.
  use_csam: true

  # When true, also trains a vanilla Autoformer (use_csam=false) on the same
  # data splits for ablation comparison. Only meaningful when use_csam=true.
  run_vanilla_autoformer_baseline: false

  # Kernel size for the 1D convolution inside the CSAM spatial attention branch.
  # Captures local temporal context. Paper uses kernel_size=7 (typical for CBAM).
  # Configurable: larger kernels capture wider context but add parameters.
  csam_kernel_size: 7

  # Channel reduction ratio for the CSAM channel attention branch.
  # The channel dimension is reduced by this factor in the bottleneck Conv1d.
  # Paper uses reduction=16 (typical for CBAM). Configurable for capacity/param tradeoff.
  csam_reduction: 16

  # When true, the model returns attention weights alongside predictions.
  # Useful for interpretability but increases memory usage. Set to false for training.
  output_attention: false

training:
  # Mini-batch size. Paper default: 32.
  # Configurable for GPU memory constraints.
  batch_size: 32

  # Maximum number of training epochs. Paper default: 20.
  epochs: 20

  # Initial learning rate for the Adam optimizer. Paper default: 0.0001.
  # Configurable for different convergence behavior.
  learning_rate: 0.0001

  # Optimizer choice. Paper uses Adam. Configurable for future experimentation.
  optimizer: "adam"

  # Loss function for training. Paper uses MSE.
  loss: "mse"

  # When true, training stops if val loss does not improve for `patience` epochs.
  early_stopping: true

  # Number of epochs to wait before early stopping. Paper default: 6.
  patience: 6

  # Max gradient norm for clipping. Helps stabilize training.
  # Leave empty to disable gradient clipping.
  gradient_clip:

  # Random seed for reproducibility. Leave empty for non-deterministic runs.
  seed:

evaluation:
  # Metrics to compute on the test set. Paper reports RMSE/MAE; R² is a useful
  # addition for variance explained. Configurable to add MAPE, SMAPE, etc.
  metrics: ["rmse", "mae", "r2"]

  # Specific prediction horizons (in minutes) to report metrics for.
  # These are sub-sampled from the full pred_len output.
  # Paper evaluates at {60, 120, 240, 300}. Use [1, 5, 15, 60] for smoke tests.
  eval_horizons: [1, 5, 15, 60]

  # When true, writes predictions.csv and ground_truth.csv for downstream analysis.
  export_predictions: true

  # When true, spectrogram and error plots are denormalized back to dBm.
  # dBm is the interpretable unit for spectrum data.
  plot_denormalized_dbm: true

paths:
  # Directory for model checkpoints. Created automatically if it does not exist.
  # Configurable per experiment to keep runs isolated.
  checkpoints_dir: "training/results/Autoformer-CSA/checkpoints"

  # Directory for evaluation outputs (metrics, predictions, plots).
  evaluation_dir: "training/results/Autoformer-CSA/evaluation"

device:
  # "auto" → cuda if available else cpu; "cuda" → force GPU; "cpu" → force CPU.
  # Configurable for debugging on CPU or submitting GPU jobs.
  device: "auto"
