# ──────────────────────────────────────────────
# Autoformer-CSA — AERPAW Spectrum Prediction Config
# ──────────────────────────────────────────────
# Everything in this file is tunable. Defaults follow the Autoformer-CSA paper
# where applicable; deviations are noted inline.

data:
  dataset_path: "training/data/merged_power_data_sub6GHz_avg_per_minute.csv"
  n_features: 750
  n_nodes: 3
  bins_per_node: 250
  node_names: ["CC1", "CC2", "LW1"]
  selected_nodes: ["CC1", "CC2", "LW1"]
  cc2_only_smoke_test: false

windowing:
  seq_len: 96
  label_len: 48
  pred_len: 60
  train_stride: 1
  val_stride:
  test_stride:

split:
  train_ratio: 0.7142857
  val_ratio: 0.1428571
  test_ratio: 0.1428571
  chronological_split: true

preprocessing:
  normalization: "zscore"
  fit_on_train_only: true

model:
  model_name: "autoformer_csa"
  enc_in: 750
  dec_in: 750
  c_out: 750
  d_model: 64
  d_ff: 256
  encoder_layers: 1
  decoder_layers: 1
  n_heads: 4
  moving_avg: 13
  dropout: 0.1
  factor: 3
  activation: "relu"
  embed: "timeF"
  freq: "h"
  csam_kernel_size: 7
  csam_reduction: 16
  output_attention: false

architecture:
  model_variant: "autoformer_csa"
  use_csam: true
  preserve_original_autoformer: false
  encoder_layer_type: "csam"
  decoder_layer_type: "csam"

training:
  batch_size: 8
  epochs: 5
  learning_rate: 0.0001
  optimizer: "adam"
  loss: "mse"
  early_stopping: true
  patience: 6
  gradient_clip: 5.0
  seed: 42

evaluation:
  metrics: ["rmse", "mae", "r2"]
  eval_horizons: [1, 5, 15, 60]
  export_predictions: true
  plot_denormalized_dbm: true

paths:
  checkpoints_dir: "training/results/Autoformer-CSA/checkpoints"
  evaluation_dir: "training/results/Autoformer-CSA/evaluation"

device:
  device: "auto"
