data:
  dataset_path: training/data/cc2_smoke_test.csv
  site_name: CC2
  n_frequency_bins: 250
  max_rows:
  has_header: false

windowing:
  input_sequence_length: 12
  prediction_horizon: 6
  train_stride: 1
  val_stride: 6
  test_stride: 6

split:
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  chronological_split: true

preprocessing:
  normalization: zscore
  fit_on_train_only: true

model:
  input_size: 250
  hidden_size: 128
  num_layers: 1
  dropout: 0.1
  output_strategy: final_hidden
  bidirectional: false

training:
  batch_size: 32
  epochs: 100
  learning_rate: 0.001
  optimizer: adam
  loss: mse
  early_stopping: true
  patience: 15
  gradient_clip: 1.0
  seed: 42

evaluation:
  metrics: ["rmse", "mae", "r2"]
  eval_horizons: [1, 3, 6]
  export_predictions: true
  plot_denormalized_dbm: true

paths:
  checkpoints_dir: training/VanillaLSTM/checkpoints
  evaluation_dir: training/VanillaLSTM/evaluation

device:
  device: auto
